<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNM Governance Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#0f141c] text-slate-200 font-sans antialiased min-h-screen">
    <header class="border-b border-slate-800 bg-[#131924] px-8 py-4 sticky top-0 z-50">
        <div class="max-w-[1500px] mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-sm font-bold text-white uppercase">Perpustakaan Negara Malaysia</h1>
                <p class="text-xs text-slate-400">Institutional Governance & Analytics</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 uppercase">Architect</p>
                <p class="text-xs font-medium text-slate-300">Mohd Khairul Ridhuan bin Mohd Fadzil</p>
            </div>
        </div>
    </header>

    <main class="max-w-[1500px] mx-auto p-6 space-y-6">
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-[#131924] p-6 rounded-xl border border-slate-800">
                <h2 id="chart-main-title" class="text-sm font-bold text-white uppercase">Integrated Macro Distribution</h2>
                <div class="h-64 mt-4"><canvas id="monthlyTrendChart"></canvas></div>
            </div>
            
            <!-- ALI CO-RESEARCHER TERMINAL -->
            <div class="bg-[#131924] border border-slate-800 rounded-xl flex flex-col h-[400px]">
                <div class="p-3 border-b border-slate-800 bg-[#171e2b] flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-cyan-400"></div>
                    <span class="text-xs font-bold text-white uppercase">Ali Co-Researcher</span>
                </div>
                <div id="chat-screen" class="flex-1 p-3 overflow-y-auto space-y-2 text-xs">
                    <div class="bg-slate-800 p-2 rounded text-slate-300"><strong>Ali:</strong> Hello! I am Ali, your research assistant. Ask me anything about this project in Malay or English.</div>
                </div>
                <div class="p-2 border-t border-slate-800 flex gap-2">
                    <input type="text" id="chat-input" onkeypress="if(event.key==='Enter') processUserChat()" class="flex-1 bg-[#0f141c] border border-slate-800 rounded px-2 py-1 text-xs text-white" placeholder="Ask Ali...">
                    <button onclick="processUserChat()" class="bg-cyan-600 px-3 py-1 rounded text-xs font-bold text-white">Send</button>
                </div>
            </div>
        </section>
    </main>
    <script src="./script.js"></script>
</body>
</html>
