<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNM Governance Dashboard</title>
    <!-- Guna CDN versi terkini -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-950 text-gray-200 p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-xl font-bold uppercase text-white">Perpustakaan Negara Malaysia</h1>
                <p class="text-sm text-gray-400">Institutional Governance & Analytics</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 uppercase">Architect</p>
                <p class="text-sm font-semibold">Mohd Khairul Ridhuan bin Mohd Fadzil</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Graph Section -->
            <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
                <h2 class="text-sm font-bold uppercase text-gray-400 mb-4">Integrated Macro Distribution</h2>
                <div class="h-64">
                    <canvas id="myChart"></canvas>
                </div>
            </div>

            <!-- Ali Chat Section -->
            <div class="bg-gray-900 rounded-xl border border-gray-800 flex flex-col h-[350px]">
                <div class="p-4 border-b border-gray-800 font-bold text-sm">ALI CO-RESEARCHER</div>
                <div id="chat-box" class="flex-1 p-4 overflow-y-auto text-sm space-y-3">
                    <p class="text-gray-400">Ali: Hello! I am Ali, your research assistant. Ask me about the project.</p>
                </div>
                <div class="p-4 border-t border-gray-800 flex gap-2">
                    <input id="chat-input" type="text" class="flex-1 bg-gray-950 border border-gray-700 rounded px-3 py-2 text-sm" placeholder="Ask Ali...">
                    <button onclick="askAli()" class="bg-blue-600 px-4 py-2 rounded text-sm font-bold">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Chart Init
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{ label: 'Analytics', data: [12, 19, 3, 5, 2, 30], borderColor: '#3b82f6', fill: true }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // 2. Ali Logic
        function askAli() {
            const input = document.getElementById('chat-input');
            const box = document.getElementById('chat-box');
            if(!input.value) return;

            box.innerHTML += `<p>You: ${input.value}</p>`;
            let q = input.value.toLowerCase();
            let res = "I am Ali. I only discuss this PNM Project.";
            
            if (q.includes('designer') || q.includes('khairul')) {
                res = "The designer is Mohd Khairul Ridhuan bin Mohd Fadzil.";
            } else if (q.includes('stat')) {
                res = "Analytics showing steady growth in June.";
            }
            
            box.innerHTML += `<p class="text-blue-400">Ali: ${res}</p>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
