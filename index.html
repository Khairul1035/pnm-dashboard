<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PNM Governance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-2">PNM Governance Dashboard</h1>
        <p class="text-gray-400 mb-6">Designed by Mohd Khairul Ridhuan bin Mohd Fadzil</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-6 rounded-xl">
                <canvas id="myChart" class="h-64"></canvas>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl">
                <h2 class="text-lg font-bold mb-4">Ali Co-Researcher</h2>
                <div id="chat-box" class="h-48 overflow-y-auto bg-gray-900 p-4 rounded mb-4 text-sm">
                    <p class="text-blue-400">Ali: Hello! I am Ali. Ask me anything.</p>
                </div>
                <input id="chat-input" type="text" class="w-full p-2 bg-gray-700 rounded mb-2" placeholder="Ask Ali...">
                <button onclick="askAli()" class="w-full bg-blue-600 py-2 rounded font-bold">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Chart
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: { labels: ['Jan', 'Feb', 'Mar'], datasets: [{ label: 'Performance', data: [10, 50, 80], borderColor: '#3b82f6' }] }
        });

        // Ali AI Logic
        function askAli() {
            const input = document.getElementById('chat-input');
            const box = document.getElementById('chat-box');
            const q = input.value.toLowerCase();
            
            box.innerHTML += `<p class="mt-2">You: ${input.value}</p>`;
            
            let response = "I am Ali. I only discuss this PNM Project.";
            if (q.includes('designer') || q.includes('khairul')) {
                response = "The designer is Mohd Khairul Ridhuan bin Mohd Fadzil.";
            } else if (q.includes('stat')) {
                response = "Performance is rising, reaching 80% currently.";
            } else if (q.includes('masak') || q.includes('cook')) {
                response = "I cannot help with that. Out of scope.";
            }
            
            box.innerHTML += `<p class="text-blue-400 mt-2">Ali: ${response}</p>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
